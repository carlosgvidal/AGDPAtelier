<style>
:root{
  --font-sans:'Helvetica Neue',Helvetica,Arial,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace;
  --agdp-cream:#FAF6F1;
  --agdp-peach:#FAD9B6;
  --agdp-dark:#4F3A27;
  --agdp-taupe:#8D7B6A;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font:16px/1.35 var(--font-sans);color:#000;background:#f7f6f2;overflow:hidden}
canvas{display:block}
.agdp-public{font-family:var(--font-sans);background:var(--agdp-cream);color:var(--agdp-dark);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
.agdp-utilbar{background:transparent;padding:12px 20px;display:flex;align-items:center;justify-content:flex-end;}
.agdp-lang-switch{display:flex;border:1px solid rgba(79,58,39,.25);border-radius:0;overflow:hidden;}
.agdp-lang-btn{font-family:var(--font-sans);font-size:11px;font-weight:700;letter-spacing:.06em;border:none;background:transparent;color:var(--agdp-taupe);padding:6px 14px;cursor:pointer;}
.agdp-lang-btn.selected{background:var(--agdp-dark);color:var(--agdp-cream);}
.agdp-body{flex:1;display:grid;grid-template-columns:420px 1fr;min-height:0;}
.agdp-form{padding:20px;overflow:visible;display:flex;flex-direction:column;gap:16px;background:var(--agdp-cream);border-right:1px solid rgba(79,58,39,.12);}
.agdp-step-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--agdp-taupe);font-weight:700;margin-bottom:8px;}
.agdp-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.agdp-type-btn{border:1.5px solid rgba(79,58,39,.25);background:#fff;border-radius:0;padding:9px 8px;font-family:var(--font-sans);font-size:12px;color:var(--agdp-dark);cursor:pointer;text-align:center;transition:all .15s ease;}
.agdp-type-btn:hover{border-color:var(--agdp-dark);}
.agdp-type-btn.selected{background:var(--agdp-dark);color:var(--agdp-cream);border-color:var(--agdp-dark);}
.agdp-select{width:100%;border:1.5px solid rgba(79,58,39,.25);border-radius:0;padding:12px 14px;font-family:var(--font-sans);font-size:14px;color:var(--agdp-dark);background:#fff;}
.agdp-select:focus{outline:none;border-color:var(--agdp-dark);}
.agdp-generate-btn{border:none;background:var(--agdp-dark);color:var(--agdp-cream);font-family:var(--font-sans);font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:13.5px;padding:16px;border-radius:0;cursor:pointer;transition:opacity .15s ease;}
.agdp-generate-btn:hover{opacity:.88;}
.agdp-seed-input{width:100%;border:1.5px solid rgba(79,58,39,.25);border-radius:0;padding:10px 12px;font-family:var(--font-mono);font-size:12px;color:var(--agdp-dark);background:#fff;}
.agdp-seed-btn{border:1.5px solid rgba(79,58,39,.25);background:#fff;border-radius:0;padding:10px 12px;font-family:var(--font-sans);font-size:12px;color:var(--agdp-dark);cursor:pointer;white-space:nowrap;}
.agdp-seed-btn:hover{border-color:var(--agdp-dark);}
.agdp-variant-btn{width:100%;min-height:44px;border-radius:0;font-weight:700;letter-spacing:.04em;}
.agdp-generate-btn:disabled{opacity:.4;cursor:default;}
.agdp-order-btn{border:1.5px solid var(--agdp-dark);background:transparent;color:var(--agdp-dark);font-family:var(--font-sans);font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:13px;padding:14px;border-radius:0;cursor:pointer;}
.agdp-order-btn:disabled{opacity:.3;cursor:default;}
.agdp-stage{position:relative;background:#fff;display:flex;align-items:center;justify-content:center;min-height:0;}
.agdp-stage canvas{width:100%;height:100%;display:block;}
.agdp-status{position:absolute;top:20px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;}
.agdp-status-badge{font-family:var(--font-sans);font-size:12px;background:var(--agdp-cream);border:1px solid rgba(79,58,39,.2);border-radius:0;padding:8px 16px;color:var(--agdp-dark);pointer-events:auto;}
.agdp-status-badge.working{color:var(--agdp-taupe);}
.agdp-status-badge.thinking{color:var(--agdp-dark);display:flex;align-items:center;gap:9px;}
.agdp-status-badge.thinking::before{content:'';width:10px;height:10px;border:1.5px solid currentColor;border-right-color:transparent;border-radius:0;animation:agdpThink .8s linear infinite;}
@keyframes agdpThink{to{transform:rotate(360deg)}}
.agdp-status-badge.ready{color:#3a6b3a;}
.agdp-dims-panel{position:absolute;left:20px;bottom:20px;background:var(--agdp-cream);border:1px solid rgba(79,58,39,.2);border-radius:0;padding:12px 16px;font-family:var(--font-sans);font-size:12.5px;line-height:1.6;color:var(--agdp-dark);max-width:260px;}
.agdp-dims-panel .dims-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--agdp-taupe);font-weight:700;margin-bottom:4px;}
.agdp-dims-panel .dims-row{display:flex;justify-content:space-between;gap:16px;}
.agdp-dims-panel .dims-val{font-weight:700;}
.agdp-empty-state{font-family:var(--font-sans);color:var(--agdp-taupe);text-align:center;padding:40px;max-width:340px;font-size:14px;line-height:1.5;}
@media(max-width:820px){
  html,body{overflow:visible;height:auto;}
  .agdp-public{height:auto;overflow:visible;}
  .agdp-body{grid-template-columns:1fr;grid-template-rows:auto auto;min-height:auto;}
  .agdp-stage{
    position:sticky;top:0;z-index:5;
    min-height:44vh;max-height:48vh;
    order:-1;
    border-bottom:1px solid rgba(79,58,39,.15);
    box-shadow:0 4px 10px rgba(79,58,39,.08);
  }
  .agdp-form{
    order:1;
    border-right:none;border-bottom:none;
    overflow:visible;
    padding:18px 16px 32px;
  }
}
.agdp-stage #view{width:100%;height:100%;display:none;background:#fff;touch-action:none;}

<script>
'use strict';
const AGDP_APP_VERSION='0.201';
window.AGDP_APP_VERSION=AGDP_APP_VERSION;
window.addEventListener('error',function(e){
  const statusWrap=document.getElementById('agdpStatusWrap');
  const statusBadge=document.getElementById('agdpStatusBadge');
  if(statusWrap)statusWrap.style.display='flex';
  if(statusBadge){
    statusBadge.className='agdp-status-badge';
    statusBadge.textContent='Error de visualización · '+(e&&e.message?e.message:'error desconocido');
  }
  console.error('AGDP Atelier '+AGDP_APP_VERSION+' · error global',e);
});
window.addEventListener('unhandledrejection',function(e){
  console.error('AGDP Atelier '+AGDP_APP_VERSION+' · promesa rechazada',e.reason);
});
const $=id=>document.getElementById(id);
const canvas=$('view');

const SeededVariation=(()=>{
  function hash(value){
    const text=String(value||'AGDP');
    let h=2166136261>>>0;
    for(let i=0;i<text.length;i++){h^=text.charCodeAt(i);h=Math.imul(h,16777619);}
    h+=h<<13;h^=h>>>7;h+=h<<3;h^=h>>>17;h+=h<<5;
    return h>>>0;
  }
  function createGenerator(seed){
    let a=hash(seed)||0x6d2b79f5;
    return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return ((t^(t>>>14))>>>0)/4294967296;};
  }
  function normalize(seed){
    const cleaned=String(seed||'').trim().replace(/[^A-Za-z0-9_-]/g,'').slice(0,48);
    return cleaned||newSeed();
  }
  function newSeed(){
    const bytes=new Uint32Array(4);
    if(window.crypto&&window.crypto.getRandomValues)window.crypto.getRandomValues(bytes);
    else{
      const now=Date.now()>>>0, perf=(performance.now()*1000000)>>>0;
      bytes[0]=now;bytes[1]=perf;bytes[2]=(now^perf^Math.floor(Math.random()*0xffffffff))>>>0;bytes[3]=Math.floor(Math.random()*0xffffffff)>>>0;
    }
    return 'AGDP-'+Array.from(bytes,v=>v.toString(36).toUpperCase().padStart(7,'0')).join('-');
  }
  function signed(rng){return rng()*2-1;}
  function range(rng,a,b){return a+(b-a)*rng();}
  function integer(rng,a,b){return Math.floor(range(rng,a,b+1));}
  function extremal(rng,min,max,power){
    power=power==null?2.8:power;
    const side=rng()<0.5?0:1;
    const x=Math.pow(rng(),power);
    const t=side===0?x:1-x;
    return min+(max-min)*t;
  }
  function contrastedWeights(rng){
    const keys=['lattice','cellular','vessel','dome','wrapped','cage','interweave'];
    const values={};
    keys.forEach(k=>{values[k]=range(rng,.04,.58);});
    const first=keys.splice(Math.floor(rng()*keys.length),1)[0];
    const second=keys.splice(Math.floor(rng()*keys.length),1)[0];
    values[first]=range(rng,.78,1.00);
    values[second]=range(rng,.62,.94);
    if(rng()<.62){
      const recessed=keys[Math.floor(rng()*keys.length)];
      values[recessed]=range(rng,.02,.12);
    }
    values.continuity=extremal(rng,.28,1.00,2.15);
    return Object.freeze(values);
  }
  function apply(params,seed){
    const p=Object.assign({},params);
    p.seed=normalize(seed||p.seed);
    const rng=createGenerator(p.seed+'|'+(p.type||'piece')+'|variation-v3-sculptural');

    p.variantSelector=rng();
    p.sculpturalVolume=extremal(rng,.12,1.00,2.05);
    p.formContrast=extremal(rng,.18,1.00,2.15);
    p.variation={
      phaseA:rng()*Math.PI*2,phaseB:rng()*Math.PI*2,phaseC:rng()*Math.PI*2,
      contour:signed(rng),axial:signed(rng),radial:signed(rng),detail:signed(rng),
      jitter:extremal(rng,.46,1.52,2.0),rhythm:extremal(rng,.48,1.62,2.0),
      scaleU:extremal(rng,.62,1.48,2.05),scaleV:extremal(rng,.58,1.52,2.05),
      density:extremal(rng,.08,1.00,2.0),offset:signed(rng)
    };

    p.featureWeights=contrastedWeights(rng);

    p.risk=Math.min(1,Math.pow(rng(),.86)*1.08);
    p.organic=extremal(rng,.02,.98,2.15);
    p.architectural=extremal(rng,.02,.98,2.15);
    p.longitudinal=extremal(rng,.04,.98,2.05);
    p.asymmetry=clamp(extremal(rng,.00,.58,2.15)*(1+p.risk*.62),0,.72);
    p.faceting=extremal(rng,.01,.92,2.15);
    p.smoothness=extremal(rng,.12,.98,2.10);
    p.structuralConflict=p.risk*(Math.abs(p.organic-p.architectural)+p.asymmetry+p.variation.density+p.formContrast*.55);

    const volumeGain=.82+p.sculpturalVolume*1.18;
    p.surfaceRelief=range(rng,.020,.132)*(1+p.risk*.95)*volumeGain;
    p.sideRelief=range(rng,.010,.094)*(1+p.sculpturalVolume*.72);
    p.railCount=integer(rng,0,4);
    p.railHeight=range(rng,.85,2.75)*(1+p.sculpturalVolume*.22);
    p.railGap=range(rng,1.10,3.90);
    p.holes=integer(rng,0,5);
    p.holeCoverage=range(rng,58,170)*(1+p.risk*.46);
    p.nodes=integer(rng,0,6);
    p.nodeVolume=range(rng,1.00,3.25)*(1+p.risk*.72)*(1+p.sculpturalVolume*.48);
    p.frames=range(rng,.02,.88);
    p.rivets=integer(rng,0,4);
    p.screws=integer(rng,0,3);
    p.hinges=integer(rng,0,2);
    p.articulationCoverage=range(rng,48,168);
    p.articulationOffset=signed(rng)*52*(1+p.risk*.72);
    p.crown=rng()<(.30+p.sculpturalVolume*.34);
    p.crownArc=extremal(rng,24,154,2.0);
    p.crownMass=range(rng,.85,3.85)*(1+p.sculpturalVolume*.56);
    p.spikes=p.crown&&rng()<.38?integer(rng,1,4):0;
    p.spikeHeight=range(rng,.74,1.42);

    p.mutation={
      active:rng()<.28,
      severity:Math.pow(rng(),.42),
      mode:['rupture','hypertrophy','erosion','displacement','compression','proliferation','inversion'][Math.floor(rng()*7)]
    };
    if(p.mutation.active){
      const sv=p.mutation.severity;
      if(p.mutation.mode==='rupture'){
        p.featureWeights=Object.freeze(Object.assign({},p.featureWeights,{
          continuity:clamp(p.featureWeights.continuity*(1-sv*.72),.10,1),
          cage:clamp(p.featureWeights.cage+sv*.64,.02,1),
          lattice:clamp(p.featureWeights.lattice+sv*.56,.02,1)
        }));
        p.railCount=Math.min(4,(p.railCount||0)+Math.round(1+sv*2));
      }else if(p.mutation.mode==='hypertrophy'){
        p.nodeVolume=(p.nodeVolume||1.4)*(1+sv*1.85);
        p.crownMass=(p.crownMass||1.75)*(1+sv*1.35);
        p.surfaceRelief=(p.surfaceRelief||.05)*(1+sv*.55);
        p.asymmetry=clamp((p.asymmetry||.1)+sv*.34,0,.72);
      }else if(p.mutation.mode==='erosion'){
        p.holes=Math.min(6,(p.holes||0)+Math.round(1+sv*3));
        p.holeCoverage=(p.holeCoverage||118)*(1+sv*.58);
        p.featureWeights=Object.freeze(Object.assign({},p.featureWeights,{cellular:clamp(p.featureWeights.cellular+sv*.62,.02,1)}));
      }else if(p.mutation.mode==='displacement'){
        p.articulationOffset=(signed(rng)>=0?1:-1)*(68+sv*94);
        p.crownArc=range(rng,18,58);
        p.asymmetry=clamp((p.asymmetry||.1)+sv*.28,0,.72);
      }else if(p.mutation.mode==='compression'){
        p.smoothness=clamp((p.smoothness||.5)*(1-sv*.58),.04,1);
        p.surfaceRelief=(p.surfaceRelief||.05)*(1+sv*1.12);
        p.longitudinal=clamp((p.longitudinal||.5)*(1+sv*.72),0,1);
      }else if(p.mutation.mode==='proliferation'){
        p.nodes=Math.min(6,(p.nodes||0)+Math.round(1+sv*3));
        p.rivets=Math.min(5,(p.rivets||0)+Math.round(sv*3));
        p.railCount=Math.min(4,(p.railCount||0)+Math.round(sv*2));
        p.nodeVolume=(p.nodeVolume||1.4)*(1+sv*.42);
      }else if(p.mutation.mode==='inversion'){
        const fw=p.featureWeights;
        p.featureWeights=Object.freeze({
          lattice:fw.cellular,cellular:fw.lattice,
          vessel:fw.wrapped,wrapped:fw.vessel,
          dome:fw.cage,cage:fw.dome,
          interweave:fw.interweave,continuity:fw.continuity
        });
        p.organic=1-(p.organic||.5);
        p.architectural=1-(p.architectural||.5);
      }
    }

    // Functional limits for the active compact typologies.
    if(p.type==='earCuff'){
      p.holes=integer(rng,0,2);p.nodes=integer(rng,0,3);p.crown=false;p.spikes=0;
      p.nodeVolume=Math.min(p.nodeVolume,3.8);
    }else if(p.type==='cufflinks'){
      p.holes=integer(rng,0,1);p.nodes=integer(rng,0,4);p.crown=false;p.spikes=0;
      p.nodeVolume=Math.min(p.nodeVolume,4.5);
    }
    return p;
  }
  return Object.freeze({apply,newSeed,normalize,createGenerator});
})();

function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
function wrap(a){while(a>Math.PI)a-=2*Math.PI;while(a<-Math.PI)a+=2*Math.PI;return a;}

/* =========================================================================
   AGDP PROPORTION ENGINE
   Explicit dimensional envelopes keep the sculptural seed from inflating
   wearable widths beyond the collection's calibrated limits. Fit dimensions
   remain independent; only visible width, height and projection are bounded.
   ========================================================================= */
const AGDP_PROPORTION_SYSTEM=Object.freeze({
  moduleMm:Object.freeze({min:3.6,canonical:5.4,max:7.0}),
  widthRangesMm:Object.freeze({
    ring:Object.freeze([3.6,6.5]),
    bangle:Object.freeze([3.6,7.0]),
    cuffBracelet:Object.freeze([3.6,7.0]),
    earCuff:Object.freeze([3.6,6.5])
  }),
  envelopeRangesMm:Object.freeze({
    pendant:Object.freeze([23.5,40]),
    cufflinks:Object.freeze([15,25]),
    chokerTorque:Object.freeze([6,14]),
    chokerSculptural:Object.freeze([28,52]),
    chokerCervical:Object.freeze([34,58]),
    headpiece:Object.freeze([18,42])
  }),
  projectionRangesMm:Object.freeze({
    ring:Object.freeze([2.2,4.8]),
    bangle:Object.freeze([2.6,5.8]),
    cuffBracelet:Object.freeze([2.8,6.2]),
    earCuff:Object.freeze([2.2,4.8]),
    pendant:Object.freeze([3.2,7.2]),
    cufflinks:Object.freeze([3.2,7.0]),
    chokerTorque:Object.freeze([3.8,6.0]),
    chokerSculptural:Object.freeze([4.2,7.2]),
    chokerCervical:Object.freeze([4.6,7.2]),
    headpiece:Object.freeze([2.8,5.4])
  })
});

const ProportionEngine=(()=>{
  function lerp(a,b,t){return a+(b-a)*clamp(t,0,1);}
  function normalizeCrownMass(x){return clamp(((x==null?1.75:x)-1.0)/3.8,0,1);}
  function normalizeNodeVolume(x){return clamp(((x==null?1.45:x)-1.0)/4.2,0,1);}
  function profileKey(p){
    if(p.type!=='choker')return p.type;

/* =========================================================================
   LOAD GRAPH ENGINE
   The seed does not start from a torus or a curve. It starts from a graph
   of structural loads: nodes carrying a role (support, articulation,
   compression, tension, suspension, mass, void) and edges carrying a
   structural relation (loop, bridge, surround, traverse, interrupt) with
   their own properties (rigidity, torsion, width, continuity).

   There are no discrete families here. The graph's own composition is
   measured into continuous structural intensities (bridge presence, void
   presence, node/mass presence, organism/curvature presence, loop
   continuity) and every one of those intensities is blended into every
   piece, of every category, by the same rules — exactly the same
   "campo formal continuo" principle this engine already applies to
   featureWeights, extended one level upstream of it. A ring, a comb, and
   a money clip all read the same graph the same way; only their existing
   per-type geometry builders differ, never the rules that feed them.

   A universal structural-safety pass (enforceStructuralSafety) is applied
   to every compiled piece regardless of type, so that no seed can ever
   produce a fragile or dangerous result — this is a hard floor, not a
   diagnostic suggestion.
   ========================================================================= */
const LoadGraphEngine = (()=>{
  const NODE_ROLES = ['support','articulation','compression','tension','suspension','mass','void'];
  const EDGE_TYPES = ['loop','bridge','surround','traverse','interrupt'];

  function rngFor(seed,tag){ return SeededVariation.createGenerator(String(seed||'AGDP')+'|loadgraph|'+tag); }

  // ---- Graph construction --------------------------------------------------
  // A ring/bangle/etc's principal loop is always present (Regla 1: debe
  // existir un loop principal). Everything else is attached to it. The
  // graph is built once per seed, identically in shape for every category —
  // only the geometry that later reads it differs.
  function buildLoadGraph(seed, type){
    const rng = rngFor(seed, type);
    const nodes = [];
    const edges = [];

    const loopNode = { id:'loop0', role:'support', u:0, radialOffset:0,
      radius:1.0, curvature:1.0, thickness:1.0, fn:'principalLoop' };
    nodes.push(loopNode);
    const loopContinuity = 0.55+0.45*rng();
    edges.push({ from:'loop0', to:'loop0', type:'loop', rigidity:0.8+0.2*rng(), torsion:rng()<0.35?rng()*0.35:0, width:1, continuity:loopContinuity });

    // Secondary structural nodes: 1-4, each with a genuine structural role,
    // never a purely decorative one (Regla 3, Regla 8: primitives never
    // appear pure/unmodified — every node's geometry is derived from its
    // role + attributes, not a bare sphere/cube).
    const secondaryCount = 1+Math.floor(rng()*4);
    const rolePool = ['articulation','compression','tension','suspension','mass','void'];
    for (let i=0;i<secondaryCount;i++){
      const role = rolePool[Math.floor(rng()*rolePool.length)];
      const node = {
        id:'n'+i, role,
        u: rng(),
        radialOffset: (rng()*2-1)*0.4,
        radius: 0.35+rng()*0.9,
        curvature: rng(),
        thickness: 0.4+rng()*0.8,
        fn: role
      };
      nodes.push(node);
      // Every node connects to the loop — Regla 2: no existen elementos
      // aislados, todo debe conectarse.
      edges.push({ from:'loop0', to:node.id, type: role==='void' ? 'traverse' : 'surround',
        rigidity:0.3+0.6*rng(), torsion:0, width:0.3+0.5*rng(), continuity:0.5+0.5*rng() });
    }

    // Bridges are present in every graph to some continuous degree — never
    // gated behind an exclusive category. Even a graph that ends up with
    // zero explicit bridge edges still contributes a near-zero (not
    // undefined) bridge intensity, so downstream code never has to branch
    // on "does this piece have bridges or not."
    const bridgeCount = Math.floor(rng()*3) + (rng()<0.55 ? 1 : 0);
    for (let i=0;i<bridgeCount && nodes.length>=2;i++){
      const a = nodes[1+Math.floor(rng()*(nodes.length-1))];
      const b = nodes[1+Math.floor(rng()*(nodes.length-1))];
      if (a.id===b.id) continue;
      edges.push({ from:a.id, to:b.id, type:'bridge',
        rigidity:0.6+0.4*rng(), torsion:0, width:0.4+0.5*rng(), continuity:0.4+0.4*rng() });
    }

    // Exactly one semantic event/center is guaranteed (Regla 7).
    let eventNode = nodes.slice(1).sort((a,b)=>b.radius-a.radius)[0];
    if (!eventNode){
      eventNode = { id:'event0', role:'mass', u:0.5, radialOffset:0, radius:0.8, curvature:0.6, thickness:0.7, fn:'mass' };
      nodes.push(eventNode);
      edges.push({ from:'loop0', to:eventNode.id, type:'surround', rigidity:0.7, torsion:0, width:0.6, continuity:0.7 });
    }
    eventNode.isEvent = true;

    // Regla 6 enforcement, by construction: mass must compensate —
    // asymmetry is allowed, imbalance is not. If multiple mass/compression
    // nodes would all sit near maximum radius simultaneously, scale the
    // secondary ones down so exactly one can carry the dominant weight.
    const massCandidates = nodes.filter(n=>n.role==='mass'||n.role==='compression');
    if (massCandidates.length>1){
      const dominant = massCandidates.reduce((best,n)=>n.radius>best.radius?n:best, massCandidates[0]);
      massCandidates.forEach(n=>{

    const graph = { nodes, edges, intensities, seed, type };

  // No classification, no exclusive category: every one of these reads
  // 0..1 and every one of them is present, in some measure, in every
  // graph. This is what actually feeds every piece of every category —
  // the same five numbers, read the same way, everywhere.
  function measureIntensities(nodes, edges){
    const bridgeEdges = edges.filter(e=>e.type==='bridge');
    const traverseEdges = edges.filter(e=>e.type==='traverse');
    const massNodes = nodes.filter(n=>n.role==='mass'||n.role==='compression');

  // enforceStructuralSafety below, not just reported here).
  function auditRules(graph){

    const rule1 = loopEdges.length===1;

    // own middle, which a single dominant, off-center mass would violate
    // even if some other node happens to be small.
    const rule6 = (()=>{
      if (massRoles.length<=1) return true;

    // accumulated detail, not a permanently-true placeholder.

    // one-off detail: at least one edge type must actually repeat, not
    // just "as many edges as nodes" (which says nothing about whether
    // any of it repeats).
    const rule10 = (()=>{
      if (edges.length>nodes.length) return true;
      if (edges.length<nodes.length) return false;
      const typeCounts={};
      edges.forEach(e=>{ typeCounts[e.type]=(typeCounts[e.type]||0)+1; });
      return Object.values(typeCounts).some(c=>c>=2);
    })();
    const results = { rule1, rule2, rule3, rule4, rule5, rule6, rule7, rule8, rule9, rule10 };

  // ---- Universal continuous feed into every category -----------------------
  // The same five intensities blend into the same featureWeights and
  // structural fields for every type — ring, bangle, choker, comb, clip,
  // money clip, cufflinks, everything. No branch on category, no branch
  // on a discrete family. Differences between pieces come only from the
  // seed's own numbers, never from a selected code path.
  function applyGraphToParams(params, graph){
    const p = Object.assign({}, params);
    const I = graph.intensities;
    p.loadGraph = graph;

    const fw = Object.assign({}, p.featureWeights || {});

    fw.lattice   = clamp(((fw.lattice||0.3)   + I.bridge*0.7 + I.void*0.5) / 1.9, 0.04, 1);
    fw.cellular  = clamp(((fw.cellular||0.3)  + I.void*0.9)       / 1.5, 0.04, 1);
    fw.vessel    = clamp(((fw.vessel||0.3)    + I.node*0.8)       / 1.5, 0.04, 1);
    fw.dome      = clamp(((fw.dome||0.3)      + I.node*0.6)       / 1.3, 0.04, 1);
    fw.wrapped   = clamp(((fw.wrapped||0.3)   + I.suspension*0.8) / 1.5, 0.04, 1);
    fw.interweave= clamp(((fw.interweave||0.3)+ I.suspension*0.6 + I.bridge*0.3) / 1.6, 0.04, 1);
    fw.continuity= clamp(((fw.continuity||0.7)+ I.continuity*0.5) / 1.4, 0.35, 1);
    p.featureWeights = Object.freeze(fw);

    // Direct structural fields, blended continuously rather than switched:
    // every ring/bangle/cuff can carry some rail/bridge structure, every
    // piece can carry some perforation, every piece can carry some node
    // mass — proportional to the graph, never gated by category or family.
    p.railCount = Math.max(0, Math.round((p.railCount||0) + I.bridge*2.4));
    p.holes = Math.max(0, Math.round((p.holes||0) + I.void*3.2));
    p.nodes = Math.max(0, Math.round((p.nodes||0) + (I.node+I.suspension)*2.2));
    p.nodeVolume = Math.max(p.nodeVolume||1, 1+I.node*1.6);
    p.frames = clamp((p.frames||0.3) + I.bridge*0.35, 0, 0.9);
    p.organic = clamp((p.organic||0.3) + I.organism*0.30, 0, 1);
    p.smoothness = clamp((p.smoothness||0.5) + I.organism*0.20, 0, 1);
    p.asymmetry = clamp((p.asymmetry||0.1) + (1-I.continuity)*0.12, 0, 0.5);

  // ---- Universal structural safety (hard floor, every category) -----------

  function shrinkCompensatedDiameter(nominalMm){ return (nominalMm+0.25)*1.025; }
  function pendantWeightCategory(grams){
    if(grams<5)return 'light';
    if(grams<=10)return 'medium';
    return 'heavy';
  }
  function showDimensions(result, params){
    const dim = result.audit.bounds.dim;
    const rows = [];
    const overallStr = dim.map(d=>d.toFixed(1)).join(' × ')+' mm';
    if(params.type==='ring'){
      rows.push([t('dimNominal'), (params.mainSizeNominal!=null?params.mainSizeNominal:params.mainSize).toFixed(2)+' mm']);
      rows.push([t('dimWidth'), params.bandWidth.toFixed(1)+' mm']);
    } else if(params.type==='choker'){
      rows.push([t('dimInnerWidth'), params.mainSize.toFixed(1)+' mm']);
      rows.push([t('dimInnerDepth'), params.chokerInnerDepthMm.toFixed(1)+' mm']);
      rows.push([t('dimOpening'), params.chokerOpeningMm.toFixed(1)+' mm']);
      rows.push([t('dimFrontHeight'), params.bandWidth.toFixed(1)+' mm']);
      rows.push([t('dimRearHeight'), (params.bandWidth*params.chokerRearHeightRatio).toFixed(1)+' mm']);
      rows.push([t('dimThickness'), params.chokerWallMm.toFixed(1)+' mm']);
      rows.push([t('dimTargetWeight'), params.chokerWeightRange[0]+'–'+params.chokerWeightRange[1]+' g']);
    } else if(params.type==='headpiece'){
      rows.push([t('dimEarToEar'), params.mainSize.toFixed(1)+' mm']);
      rows.push([t('dimCranialDepth'), params.headInnerDepthMm.toFixed(1)+' mm']);
      rows.push([t('dimArc'), params.headArcDeg.toFixed(0)+'°']);
      rows.push([t('dimFrontHeight'), params.bandWidth.toFixed(1)+' mm']);
      rows.push([t('dimCrownRise'), params.headCrownRiseMm.toFixed(1)+' mm']);
      rows.push([t('dimThickness'), params.headWallMm.toFixed(1)+' mm']);
      rows.push([t('dimTargetWeight'), params.headWeightRange[0]+'–'+params.headWeightRange[1]+' g']);
    } else if(params.type==='comb'){
      rows.push([t('dimTotalWidth'), params.mainSize.toFixed(1)+' mm']);
      rows.push([t('dimTopHeight'), params.combTopHeightMm.toFixed(1)+' mm']);
      rows.push([t('dimToothLength'), params.combToothLengthMm.toFixed(1)+' mm']);
      rows.push([t('dimToothCount'), String(params.combToothCount)]);
      rows.push([t('dimToothSpacing'), params.combToothSpacingMm.toFixed(1)+' mm']);
      rows.push([t('dimCranialCurve'), params.combCranialCurveMm.toFixed(1)+' mm']);
      rows.push([t('dimInsertionAngle'), params.combInsertionAngleDeg.toFixed(0)+'°']);
      rows.push([t('dimThickness'), params.combBodyWallMm.toFixed(1)+' mm']);
      rows.push([t('dimTargetWeight'), params.combWeightRange[0]+'–'+params.combWeightRange[1]+' g']);
    } else if(params.type==='moneyClip'){
      rows.push([t('dimMoneyClipLength'), params.moneyClipLengthMm.toFixed(1)+' mm']);
      rows.push([t('dimMoneyClipWidth'), params.moneyClipWidthMm.toFixed(1)+' mm']);
      rows.push([t('dimThickness'), params.moneyClipThicknessMm.toFixed(1)+' mm']);
      rows.push([t('dimMoneyClipCapacity'), params.moneyClipGapMm.toFixed(1)+' mm']);

      rows.push([t('dimClipLength'), params.clipLengthMm.toFixed(1)+' mm']);
      rows.push([t('dimClipWidth'), params.clipFaceWidthMm.toFixed(1)+' mm']);
      rows.push([t('dimClipHeight'), params.clipFaceHeightMm.toFixed(1)+' mm']);
      rows.push([t('dimThickness'), params.clipThicknessMm.toFixed(1)+' mm']);
      rows.push([t('dimClipGap'), params.clipGapMm.toFixed(1)+' mm']);
    } else if(params.type==='cuffBracelet'){
      rows.push([t('dimInnerWidth'), (params.mainSize*1.20).toFixed(1)+' mm']);
      rows.push([t('dimInnerDepth'), (params.mainSize*0.85).toFixed(1)+' mm']);
      rows.push([t('dimWidth'), params.bandWidth.toFixed(1)+' mm']);
    } else if(params.type==='bangle'||params.type==='earCuff'){
      rows.push([t('dimInnerDiameter'), params.mainSize.toFixed(1)+' mm']);
      rows.push([t('dimWidth'), params.bandWidth.toFixed(1)+' mm']);
    } else if(params.type==='pendant'||params.type==='cufflinks'){
      rows.push([t('dimPlate'), params.mainSize.toFixed(1)+' mm']);
    }
    if(params.structuralModuleMm!=null)rows.push([t('dimStructuralModule'), params.structuralModuleMm.toFixed(2)+' mm']);
    if(params.envelopeHeightMm!=null)rows.push([t('dimFormalEnvelope'), params.envelopeHeightMm.toFixed(1)+' mm']);
    if(params.projectionDepthMm!=null)rows.push([t('dimProjection'), params.projectionDepthMm.toFixed(1)+' mm']);
    rows.push([t('dimOverall'), overallStr]);
    rows.push([t('dimWeight'), result.audit.silverG.toFixed(1)+' g']);
    if(params.type==='pendant'){
      const cat=pendantWeightCategory(result.audit.silverG);
      rows.push(['', t(cat==='light'?'weightLight':(cat==='medium'?'weightMedium':'weightHeavy'))]);
    }
    dimsPanel.innerHTML = '<div class="dims-title">'+t('dimsTitle')+'</div>'+
      rows.map(r=>'<div class="dims-row"><span>'+r[0]+'</span><span class="dims-val">'+r[1]+'</span></div>').join('');
    dimsPanel.style.display='block';
  }

  let generationSerial=0;
  const AGDP_MAX_GEOMETRY_ATTEMPTS=16;
  async function runGenerate(){
    if(!selectedType)return;
    const serial=++generationSerial;
    statusWrap.style.display='flex';
    statusBadge.textContent=t('statusGenerating');
    statusBadge.className='agdp-status-badge thinking';
    orderBtn.disabled=true;
    dimsPanel.style.display='none';
    emptyState.style.display='none';
    setRenderMesh(null);
    legacyCanvas.style.display='block';
    mountLegacyVisualization();

    await new Promise(resolve=>requestAnimationFrame(()=>requestAnimationFrame(resolve)));

    const result={params:baseParamsForType(selectedType)};
    const cfg=SIZE_CONFIG[selectedType];
    if(cfg){
      const opt=cfg.options[selectedSizeIndex]||cfg.options[0];
      if(cfg.kind==='ring'){
        result.params.mainSizeNominal=opt.diameterMm;
        result.params.mainSize=shrinkCompensatedDiameter(opt.diameterMm);
      }else if(cfg.kind==='wrist'){
        result.params.mainSize=opt.diameterMm;
      }else if(cfg.kind==='neck'){
        const chokerPickRng=SeededVariation.createGenerator(currentSeed+'|choker-profile-autopick');
        const autoChokerIdx=Math.floor(chokerPickRng()*CHOKER_PROFILES.length);
        const profile=CHOKER_PROFILES[autoChokerIdx]||CHOKER_PROFILES[0];
        const idx=Math.max(0,Math.min(2,selectedSizeIndex));
        const innerWidth=profile.widths[idx], innerDepth=profile.depths[idx], openingMm=profile.openings[idx];
        result.params.mainSize=innerWidth;
        result.params.chokerInnerDepthMm=innerDepth;
        result.params.chokerDepthRatio=innerDepth/innerWidth;
        result.params.chokerOpeningMm=openingMm;
        result.params.opening=2*Math.asin(clamp(openingMm/innerDepth,0.05,0.92))*180/Math.PI;
        result.params.bandWidth=profile.frontHeight;
        result.params.chokerRearHeightRatio=profile.rearHeightRatio;
        result.params.chokerWallMm=profile.wall;
        result.params.chokerFrontDropMm=profile.frontDrop;
        result.params.chokerRearLiftMm=profile.rearLift;
        result.params.chokerFrontProjection=profile.frontProjection;
        result.params.chokerProfile=profile.key;
        result.params.chokerWeightRange=profile.weightRange.slice();
        result.params.segments=288;
      }else if(cfg.kind==='head'){
        const profile=HEAD_PROFILES.find(hp=>hp.key==='modular')||HEAD_PROFILES[0];
        result.params.mainSize=opt.innerWidthMm;
        result.params.headInnerDepthMm=opt.innerDepthMm;
        result.params.headDepthRatio=opt.innerDepthMm/opt.innerWidthMm;
        result.params.opening=360-profile.arcDeg;
        result.params.headArcDeg=profile.arcDeg;
        result.params.bandWidth=profile.frontHeight;
        result.params.headSideHeightRatio=profile.sideHeightRatio;
        result.params.headRearHeightRatio=profile.rearHeightRatio;
        result.params.headWallMm=profile.wall;
        result.params.headCrownRiseMm=profile.crownRise;
        result.params.headTempleDropMm=profile.templeDrop;
        result.params.headFrontProjection=profile.frontProjection;
        result.params.headProfile=profile.key;
        result.params.headWeightRange=profile.weightRange.slice();
        result.params.segments=304;
      }else if(cfg.kind==='comb'){
        const profile=COMB_PROFILES[selectedCombProfile]||COMB_PROFILES[0];
        result.params.mainSize=opt.totalWidthMm;
        result.params.bandWidth=opt.topHeightMm;
        result.params.combTopHeightMm=opt.topHeightMm;
        result.params.combToothLengthMm=opt.toothLengthMm;
        result.params.combToothCount=profile.teeth;
        result.params.combBodyWallMm=profile.bodyWall;
        result.params.combToothDiameterMm=profile.toothDiameter;
        result.params.combArchMm=profile.arch;
        result.params.combDepthMm=profile.depth;
        result.params.combCranialCurveMm=profile.cranialCurve;
        result.params.combInsertionAngleDeg=profile.insertionAngle;
        result.params.combToothSweepMm=profile.toothSweep;
        result.params.combTipReturnMm=profile.tipReturn;
        result.params.combProfile=profile.key;
        result.params.combWeightRange=profile.weightRange.slice();
        result.params.combToothSpacingMm=(opt.totalWidthMm-18)/(profile.teeth-1);
        result.params.segments=240;
      }else if(cfg.kind==='moneyClip'){
        result.params.mainSize=opt.lengthMm;
        result.params.bandWidth=opt.widthMm;
        result.params.moneyClipLengthMm=opt.lengthMm;
        result.params.moneyClipWidthMm=opt.widthMm;
        result.params.moneyClipThicknessMm=opt.thicknessMm;
        result.params.moneyClipGapMm=opt.capacityMm;
        result.params.moneyClipReturnRadiusMm=(opt.capacityMm+opt.thicknessMm)/2;
        result.params.moneyClipRearLengthMm=opt.lengthMm-8;
        result.params.segments=240;
      }else if(cfg.kind==='pendant'){
        result.params.mainSize=opt.mainSize;
        result.params.chainFitRadiusMm=(CHAIN_FIT[selectedChainFit]||CHAIN_FIT[1]).innerMm/2;
      }
    }

    if(selectedType==='clip'){
      result.params.mainSize=32;
      result.params.bandWidth=32;
      result.params.clipLengthMm=36;
      result.params.clipWidthMm=7.2;
      result.params.clipFaceWidthMm=32;
      result.params.clipFaceHeightMm=30;
      result.params.clipThicknessMm=2.0;
      result.params.clipGapMm=2.8;
      result.params.clipSpringLengthMm=36;
      result.params.clipChainPassageMm=3.2;
      result.params.segments=224;
    }

    const requestedSeed=currentSeed;
    const baseAttemptParams=Object.assign({},result.params);
    let acceptedMesh=null;
    let acceptedParams=null;
    let acceptedSeed=null;
    let terminalEngineError=null;

    for(let attempt=0;attempt<AGDP_MAX_GEOMETRY_ATTEMPTS;attempt++){
      if(serial!==generationSerial)return;
      const candidateSeed=attempt===0?requestedSeed:SeededVariation.newSeed();
      let params=SeededVariation.apply(Object.assign({},baseAttemptParams),candidateSeed);
      params.seed=candidateSeed;
      const loadGraph=window.LoadGraphEngine.buildLoadGraph(candidateSeed,selectedType);
      params=window.LoadGraphEngine.applyGraphToParams(params,loadGraph);
      params=window.ProportionEngine.apply(params);

      try{
        if(!window.AGDP_MANIFOLD_PRELOAD_DONE){
          statusBadge.textContent=t('statusLoadingEngine');
          statusBadge.className='agdp-status-badge thinking';
        }else if(attempt>0){
          statusBadge.textContent=t('statusAdjusting');
          statusBadge.className='agdp-status-badge thinking';
        }
        const candidateMesh=await window.makeMeshManifold(params);
        window.AGDP_MANIFOLD_PRELOAD_DONE=true;
        if(candidateMesh&&candidateMesh.audit&&candidateMesh.audit.ok){
          acceptedMesh=candidateMesh;
          acceptedParams=params;
          acceptedSeed=candidateSeed;
          break;
        }
        console.warn('AGDP: variante descartada silenciosamente por auditoría geométrica',{
          attempt:attempt+1,
          type:selectedType,
          seed:candidateSeed,
          warning:candidateMesh&&candidateMesh.audit&&candidateMesh.audit.warning
        });
      }catch(e){
        console.warn('AGDP: intento de geometría descartado',{
          attempt:attempt+1,type:selectedType,seed:candidateSeed,error:e
        });
        const message=String(e&&e.message||'');
        const engineFailure=/fetch|network|import|module|failed to load|loading chunk|webassembly|wasm/i.test(message);
        if(engineFailure){terminalEngineError=e;break;}
      }

      if(attempt<AGDP_MAX_GEOMETRY_ATTEMPTS-1){
        await new Promise(resolve=>requestAnimationFrame(resolve));
      }
    }

    if(serial!==generationSerial)return;

    if(!acceptedMesh){
      console.error('AGDP: no se obtuvo una geometría válida tras los reintentos',{
        type:selectedType,attempts:AGDP_MAX_GEOMETRY_ATTEMPTS,error:terminalEngineError
      });
      statusBadge.textContent=terminalEngineError?t('statusEngineError'):t('statusUnavailable');
      statusBadge.className='agdp-status-badge';
      orderBtn.disabled=true;
      return;
    }

    currentSeed=acceptedSeed;
    window.AGDP_currentSeed=currentSeed;
    window.AGDP_currentMesh=acceptedMesh;
    window.AGDP_currentPieceName=(selectedType||'pieza')+'_'+(currentSeed||'agdp');
    setRenderMesh(acceptedMesh);
    showDimensions(acceptedMesh,acceptedParams);
    statusBadge.textContent=t('statusReady');
    statusBadge.className='agdp-status-badge ready';
    orderBtn.disabled=false;
  }
  generateBtn.addEventListener('click',runGenerate);

  function exportSTLBinary(V,F,filename){
    const triCount=F.length;
    const bufferSize=84+triCount*50;
    const buffer=new ArrayBuffer(bufferSize);
    const dv=new DataView(buffer);
    for(let i=0;i<80;i++) dv.setUint8(i,0);
    dv.setUint32(80,triCount,true);
    let offset=84;
    function normalOf(a,b,c){
      const ux=b[0]-a[0],uy=b[1]-a[1],uz=b[2]-a[2];
      const vx=c[0]-a[0],vy=c[1]-a[1],vz=c[2]-a[2];
      let nx=uy*vz-uz*vy,ny=uz*vx-ux*vz,nz=ux*vy-uy*vx;
      const len=Math.hypot(nx,ny,nz)||1;
      return [nx/len,ny/len,nz/len];
    }
    for(let i=0;i<triCount;i++){
      const f=F[i], a=V[f[0]], b=V[f[1]], c=V[f[2]];
      const n=normalOf(a,b,c);
      dv.setFloat32(offset,n[0],true); dv.setFloat32(offset+4,n[1],true); dv.setFloat32(offset+8,n[2],true);
      dv.setFloat32(offset+12,a[0],true); dv.setFloat32(offset+16,a[1],true); dv.setFloat32(offset+20,a[2],true);
      dv.setFloat32(offset+24,b[0],true); dv.setFloat32(offset+28,b[1],true); dv.setFloat32(offset+32,b[2],true);
      dv.setFloat32(offset+36,c[0],true); dv.setFloat32(offset+40,c[1],true); dv.setFloat32(offset+44,c[2],true);
      dv.setUint16(offset+48,0,true);
      offset+=50;
    }
    const blob=new Blob([buffer],{type:'model/stl'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename.endsWith('.stl')?filename:filename+'.stl';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),4000);
  }

  orderBtn.addEventListener('click',()=>{
    if(!window.AGDP_currentMesh||!window.AGDP_currentMesh.V||!window.AGDP_currentMesh.V.length){ return; }
    exportSTLBinary(window.AGDP_currentMesh.V, window.AGDP_currentMesh.F, window.AGDP_currentPieceName||'AGDP_pieza');
    orderBtn.textContent=t('orderConfirmed');
    orderBtn.disabled=true;
  });

  if(legacyCanvas) legacyCanvas.style.display='none';
  applyStaticTexts();
})();

<script type="module">


import Module from 'manifold-3d';

function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }
function wrap(a) { while (a > Math.PI) a -= 2 * Math.PI; while (a < -Math.PI) a += 2 * Math.PI; return a; }
const AGDP_MIN_WALL_MM = 0.8;
const AGDP_STRUCTURAL_WALL_MM = 1.3;

function meshToManifold(wasm, V, F) {
  const { Manifold, Mesh } = wasm;
  const positions = new Float32Array(V.length * 3);
  for (let i = 0; i < V.length; i++) { positions[i*3]=V[i][0]; positions[i*3+1]=V[i][1]; positions[i*3+2]=V[i][2]; }
  const triangles = new Uint32Array(F.length * 3);
  for (let i = 0; i < F.length; i++) { triangles[i*3]=F[i][0]; triangles[i*3+1]=F[i][1]; triangles[i*3+2]=F[i][2]; }
  const mesh = new Mesh({ numProp: 3, vertProperties: positions, triVerts: triangles });
  return new Manifold(mesh);
}
function manifoldToMesh(manifoldObj) {
  const out = manifoldObj.getMesh();

    const ringOuterR = Math.max(AGDP_MIN_WALL_MM*1.4, baseWall*1.9+p.nodeVolume*0.9);
    const ringInnerR = Math.max(AGDP_MIN_WALL_MM*0.7, ringOuterR-baseWall*1.1);
    const ringThickness = Math.max(AGDP_MIN_WALL_MM*0.8, baseWall*0.6);
    const ex=[-st0,ct0,0], ey=[0,0,1], ez=[ct0,st0,0];
    const overlapMargin = Math.min(ringOuterR*0.3, baseWall*0.5);
    const originRadial = surfaceHere+ringOuterR-overlapMargin;
    const origin=[originRadial*ct0, originRadial*st0, 0];
    decorations.push(insertedRingManifold(wasm, origin, ex, ey, ez, ringInnerR, ringOuterR, ringThickness, 40));
  }
  const nodeCount = (insertRingMode||cellularActive) ? 0 : Math.max(0, Math.round(p.nodes||0));
  if (nodeCount>0) {
    const cov = (p.articulationCoverage||120)*Math.PI/180;
    for (let k=0;k<nodeCount;k++) {
      const u = nodeCount===1?.5:k/(nodeCount-1);
      const t = (p.articulationOffset||0)*Math.PI/180-cov/2+cov*u;
      const sr = Math.max(AGDP_MIN_WALL_MM*0.7, 0.45+p.nodeVolume*.3);
      const nodeZ = (k%2?1:-1)*bandW*0.18;
      const localEmbed = Math.min(embedAtZ(t,nodeZ), sr*0.9);
      const rr = localSurfaceRZ(t,nodeZ)+sr-localEmbed;
      decorations.push(sphereAt(wasm, [rr*Math.cos(t), rr*Math.sin(t), nodeZ], sr, 14));
    }
  }
  if (closed && (opts.type==='ring'||opts.type==='bangle')) {
    const hallmarkArcMm = 8.5;
    const tHalfSpan = Math.min(Math.PI*0.4, (hallmarkArcMm/2)/Math.max(innerR,3));
    const engraveDepth = 0.34;
    const embedDepthHallmark = Math.max(0.5, baseWall*0.85);
    const hallmarkMesh = curvedInteriorHallmarkMesh(innerR, comfortDepth, half, 0, tHalfSpan, 0.08, 0.92, engraveDepth, embedDepthHallmark, ['A','GROSS','DOMESTIC','PRODUCT.\u00AE','925'], rasterizeTextMaskNode);
    decorations.push(meshToManifold(wasm, hallmarkMesh.V, hallmarkMesh.F));
  }
  if (!closed) {
    const tEnd0=-arcRad/2, tEnd1=arcRad/2;
    [tEnd0, tEnd1].forEach(te => {
      const ct=Math.cos(te), st=Math.sin(te);
      const wallHere = localSurfaceRZ(te,0)-innerR;
      const ballR = Math.max(AGDP_MIN_WALL_MM*1.1, wallHere*0.62);
      const rCenter = innerR+ballR;
      decorations.push(sphereAt(wasm, [rCenter*ct, rCenter*st, 0], ballR, 14));
    });
  }

  const featureWeights=p.featureWeights||{};
  const floors={lattice:.24,vessel:.18,cellular:.22};
  const accentRng=window.SeededVariation.createGenerator(String(p.seed||'AGDP')+'|transversal-subtractive-v106');
  const voidCutters=[];
  const applyTransversalCuts = true;
  const phase=(p.compositionSignature?.phaseA||0)+accentRng()*Math.PI*2;

  const latticeI=clamp(Math.max(floors.lattice,featureWeights.lattice||0),floors.lattice,1);
  const vesselI=clamp(Math.max(floors.vessel,featureWeights.vessel||0),floors.vessel,1);
  const cellularI=clamp(Math.max(floors.cellular,featureWeights.cellular||0),floors.cellular,1);

  if (applyTransversalCuts) {
  {
    const t=phase+1.18,ct=Math.cos(t),st=Math.sin(t);
    const tangential=Math.max(AGDP_MIN_WALL_MM*1.25,baseWall*(.75+.42*latticeI));
    const axial=Math.max(AGDP_MIN_WALL_MM*1.35,bandW*(.16+.14*latticeI));
    const radial=Math.max(baseWall*4,AGDP_MIN_WALL_MM*5);
    const centerR=innerR+baseWall*.72;
    voidCutters.push(wasm.Manifold.cube([radial,tangential,axial],true)
      .rotate([0,0,t*180/Math.PI]).translate([centerR*ct,centerR*st,0]));
  }

  {
    const t=phase+2.42,ct=Math.cos(t),st=Math.sin(t);
    const sr=Math.max(AGDP_MIN_WALL_MM*.95,baseWall*(.17+.12*vesselI));
    const rr=localSurfaceRZ(t,0)-sr*.22;
    voidCutters.push(sphereAt(wasm,[rr*ct,rr*st,0],sr,18));
  }

  {
    const t=phase+5.72,ct=Math.cos(t),st=Math.sin(t);
    const sr=Math.max(AGDP_MIN_WALL_MM*.82,baseWall*(.14+.10*cellularI));
    const z=bandW*.08*(p.compositionSignature?.polarity||1);
    const rr=localSurfaceRZ(t,z)-sr*.18;
    voidCutters.push(sphereAt(wasm,[rr*ct,rr*st,z],sr,16));
  }
  }

  if(voidCutters.length){
    try{ bodyManifold=wasm.Manifold.difference(bodyManifold,unionAll(wasm,voidCutters)); }
    catch(err){ console.warn('AGDP: operación transversal omitida por seguridad topológica',err); }
  }

  // Ruptura literal: el loop principal se interrumpe de verdad — una
  // muesca real cortada en la superficie, nunca hasta atravesarla — y se
  // recompone mediante un puente curvo explícito que salta por encima de
  // la cicatriz. Esto es una consecuencia geométrica, no un parámetro más
  // extremo: la pieza conserva la evidencia de la interrupción.
  if (p.mutation && p.mutation.active && p.mutation.mode==='rupture' && closed) {
    const sv=p.mutation.severity;
    const ruptureRng=window.SeededVariation.createGenerator(String(p.seed||'AGDP')+'|rupture-scar');
    const rt=ruptureRng()*Math.PI*2;
    const ct=Math.cos(rt), st=Math.sin(rt);
    const surfaceHere=localSurfaceRZ(rt,0);
    // La muesca nunca llega a innerR — se detiene mucho antes, dejando
    // siempre material de sobra hacia la piel.
    const notchDepth=Math.min(baseWall*0.55*(0.4+0.6*sv), baseWall*0.62);
    const notchWidth=Math.max(AGDP_MIN_WALL_MM*1.6, baseWall*(0.85+0.55*sv));
    const notchAxial=Math.min(bandW*0.92, bandW-AGDP_MIN_WALL_MM*2);
    const notchCenterR=surfaceHere-notchDepth*0.5;
    try{
      const notchCutter=wasm.Manifold.cube([notchDepth*2.4, notchWidth, notchAxial], true)
        .rotate([0,0,rt*180/Math.PI]).translate([notchCenterR*ct, notchCenterR*st, 0]);
      bodyManifold=wasm.Manifold.difference(bodyManifold, notchCutter);
    }catch(err){ console.warn('AGDP: ruptura omitida por seguridad topológica',err); }
    // El puente: más ancho que la propia muesca, para garantizar solape
    // real en ambos lados, y proud de la superficie para leerse como una
    // reparación visible, no un remiendo oculto.
    const bridgeR=Math.max(AGDP_MIN_WALL_MM*1.35, baseWall*(0.42+0.30*sv));
    const bridgeOuterR=surfaceHere+bridgeR*0.55;
    const angularHalfSpan=(notchWidth*1.7)/(2*Math.max(surfaceHere,10));
    const bridgePts=[];
    const bridgeSamples=7;
    for(let s=0;s<=bridgeSamples;s++){
      const a=rt-angularHalfSpan+2*angularHalfSpan*(s/bridgeSamples);
      bridgePts.push([bridgeOuterR*Math.cos(a), bridgeOuterR*Math.sin(a), 0]);
    }
    const bridgeMesh=tubeAlongPathMesh(bridgePts, bridgeR, 14, false);
    decorations.push(meshToManifold(wasm, bridgeMesh.V, bridgeMesh.F));
  }

  // Hipertrofia literal: una masa adquiere escala anormal en un punto real
  // de la superficie, y el lado opuesto se adelgaza para compensar — el
  // resto de la pieza se ve obligado a ceder, no solo un número más alto.
  if (p.mutation && p.mutation.active && p.mutation.mode==='hypertrophy') {
    const sv=p.mutation.severity;
    const hRng=window.SeededVariation.createGenerator(String(p.seed||'AGDP')+'|hypertrophy');
    const ht=hRng()*Math.PI*2;
    const hct=Math.cos(ht), hst=Math.sin(ht);
    const hSurface=localSurfaceRZ(ht,0);
    const massR=Math.max(baseWall*1.4, baseWall*(1.8+2.2*sv));
    const embed=massR*0.35;
    const massCenterR=hSurface+massR-embed;
    decorations.push(sphereAt(wasm,[massCenterR*hct, massCenterR*hst, 0], massR, 22));
    const oppositeT=ht+Math.PI;
    const oppCt=Math.cos(oppositeT), oppSt=Math.sin(oppositeT);
    const oppSurface=localSurfaceRZ(oppositeT,0);
    // El adelgazamiento nunca compromete el mínimo estructural — la
    // compensación es real pero sigue siendo fabricable.
    const thinDepth=Math.min(baseWall*0.30*sv, baseWall*0.35);
    const thinWidth=baseWall*2.4;
    try{
      const thinCutter=wasm.Manifold.cube([thinDepth*2.2, thinWidth, bandW*0.7], true)
        .rotate([0,0,oppositeT*180/Math.PI]).translate([(oppSurface-thinDepth*0.5)*oppCt,(oppSurface-thinDepth*0.5)*oppSt,0]);
      bodyManifold=wasm.Manifold.difference(bodyManifold, thinCutter);
    }catch(err){ console.warn('AGDP: hipertrofia (adelgazamiento) omitida por seguridad topológica',err); }
  }

  // Erosión literal: varios vacíos reales, mayores y más numerosos que el
  // sistema de vacíos habitual, que consumen estructura en vez de
  // decorarla.
  if (p.mutation && p.mutation.active && p.mutation.mode==='erosion') {
    const sv=p.mutation.severity;
    const eRng=window.SeededVariation.createGenerator(String(p.seed||'AGDP')+'|erosion');
    const erosionCutters=[];
    const count=2+Math.round(sv*4);
    for(let k=0;k<count;k++){
      const et=eRng()*Math.PI*2;
      const ect=Math.cos(et), est=Math.sin(et);
      const ez=(eRng()*2-1)*bandW*0.38;
      const esr=Math.max(AGDP_MIN_WALL_MM*1.1, baseWall*(0.55+0.65*sv)*(0.7+0.6*eRng()));
      const esurf=localSurfaceRZ(et,ez);
      const erAdj=esurf-esr*0.15;
      erosionCutters.push(sphereAt(wasm,[erAdj*ect, erAdj*est, ez], esr, 16));
    }
    try{ bodyManifold=wasm.Manifold.difference(bodyManifold, unionAll(wasm, erosionCutters)); }
    catch(err){ console.warn('AGDP: erosión omitida por seguridad topológica',err); }
  }

  // Desplazamiento literal: el centro semántico se fuerza al borde extremo
  // real del arco, no a una zona moderadamente descentrada.
  if (p.mutation && p.mutation.active && p.mutation.mode==='displacement') {
    const sv=p.mutation.severity;
    const dRng=window.SeededVariation.createGenerator(String(p.seed||'AGDP')+'|displacement');
    const edgeT = closed ? (dRng()<0.5?-1:1)*(Math.PI*0.92) : (dRng()<0.5? -arcRad/2*0.94 : arcRad/2*0.94);
    const ect=Math.cos(edgeT), est=Math.sin(edgeT);
    const esurf=localSurfaceRZ(edgeT,0);
    const dMassR=Math.max(baseWall*1.3, baseWall*(1.5+1.3*sv));
    const embed=dMassR*0.4;
    const centerR=esurf+dMassR-embed;
    decorations.push(sphereAt(wasm,[centerR*ect, centerR*est, 0], dMassR, 20));
  }

  // Compresión literal: un lado real se aplasta hacia el eje mientras el
  // opuesto se expande — una deformación de malla, no un cambio de
  // relieve. El riesgo se encuentra con la resistencia aquí mismo: ningún
  // vértice puede quedar más cerca del interior que el mínimo
  // estructural, sin importar cuánto empuje la severidad.
  if (p.mutation && p.mutation.active && p.mutation.mode==='compression') {
    const sv=p.mutation.severity;
    try{
      const mesh=manifoldToMesh(bodyManifold);
      const cRng=window.SeededVariation.createGenerator(String(p.seed||'AGDP')+'|compression');
      const axisT=cRng()*Math.PI*2;
      const rMin=innerR+AGDP_STRUCTURAL_WALL_MM*0.9;
      for(const v of mesh.V){
        const vt=Math.atan2(v[1],v[0]);
        const rel=Math.cos(vt-axisT);
        const scale=1+(rel>=0?-0.22*sv*rel:0.16*sv*(-rel));
        const newX=v[0]*scale, newY=v[1]*scale;
        const rNew=Math.hypot(newX,newY);
        if(rNew<rMin && rNew>1e-6){
          const fix=rMin/rNew;
          v[0]=newX*fix; v[1]=newY*fix;
        }else{
          v[0]=newX; v[1]=newY;
        }
      }
      bodyManifold=meshToManifold(wasm, mesh.V, mesh.F);
    }catch(err){ console.warn('AGDP: compresión omitida por seguridad topológica',err); }
  }

  // Proliferación literal: la regla local (un nodo pequeño) se repite
  // hasta volverse colonia concentrada en una sola zona, no dispersa de
  // manera pareja.
  if (p.mutation && p.mutation.active && p.mutation.mode==='proliferation') {
    const sv=p.mutation.severity;
    const pRng=window.SeededVariation.createGenerator(String(p.seed||'AGDP')+'|proliferation');
    const colonyT=pRng()*Math.PI*2;
    const colonyCount=6+Math.round(sv*10);
    const colonySpan=Math.PI*0.22*(0.6+0.4*sv);
    for(let k=0;k<colonyCount;k++){
      const t=colonyT+(pRng()*2-1)*colonySpan;
      const ct=Math.cos(t), st=Math.sin(t);
      const z=(pRng()*2-1)*bandW*0.4;
      const surf=localSurfaceRZ(t,z);
      const r=Math.max(AGDP_MIN_WALL_MM*0.5, baseWall*(0.16+0.10*pRng()));
      const embed=r*0.5;
      const rr=surf+r-embed;
      decorations.push(sphereAt(wasm,[rr*ct,rr*st,z], r, 10));
    }
  }

  // Inversión literal: donde habría vacío aparece masa sólida, y donde
  // habría continuidad se abre un vacío real — un cambio de polaridad
  // local concreto, no solo un intercambio de pesos.
  if (p.mutation && p.mutation.active && p.mutation.mode==='inversion') {
    const sv=p.mutation.severity;
    const iRng=window.SeededVariation.createGenerator(String(p.seed||'AGDP')+'|inversion');
    const invT=iRng()*Math.PI*2;
    const ict=Math.cos(invT), ist=Math.sin(invT);
    const invSurf=localSurfaceRZ(invT,0);
    const massR=Math.max(baseWall*1.1, baseWall*(1.2+0.8*sv));
    const embed=massR*0.4;
    const massCenterR=invSurf+massR-embed;
    decorations.push(sphereAt(wasm,[massCenterR*ict, massCenterR*ist, 0], massR, 18));
    const voidT=invT+Math.PI*0.5+iRng()*0.3;
    const vct=Math.cos(voidT), vst=Math.sin(voidT);
    const voidSurf=localSurfaceRZ(voidT,0);
    const voidR=Math.max(AGDP_MIN_WALL_MM*1.2, baseWall*(0.7+0.5*sv));
    try{
      const voidCutter=sphereAt(wasm,[(voidSurf-voidR*0.2)*vct,(voidSurf-voidR*0.2)*vst,0], voidR, 16);
      bodyManifold=wasm.Manifold.difference(bodyManifold, voidCutter);
    }catch(err){ console.warn('AGDP: inversión omitida por seguridad topológica',err); }
  }

  const allParts = [bodyManifold, ...decorations];
  let result = unionAll(wasm, allParts);
  if (opts.type==='cuffBracelet'){
    // Real wrists are wider (mediolateral) than deep (anteroposterior);
    // a circular arc with a gap does not match that cross-section. The
    // whole solid is scaled elliptically post-construction, which keeps
    // every wall-thickness and connector guarantee already built into the
    // circular geometry intact.
    result = result.scale([0.85, 1.20, 1]);
  }
  return { manifold: result, bandW };
}



function featureIntensity(p,key,fallback=.35){ return clamp((p.featureWeights&&Number.isFinite(p.featureWeights[key]))?p.featureWeights[key]:fallback,0,1); }

/* =========================================================================
   STRUCTURAL KIT
   The one shared layer every typology's geometry consults for the
   operations that kept being reinvented, slightly differently, in each
   builder — which is exactly what let the same class of bug (piercing,
   floating decorations, inconsistent "solid/volumetric/lattice" meaning)
   surface repeatedly in different places. This does not merge the several
   different mesh topologies into one impossible function — a comb, a
   clip, and a ring are genuinely different shapes — but it does mean
   every one of them computes clearance, embedding, connecting veins, the
   mandatory event-mass, and treatment intensities the same way, once.
   ========================================================================= */
const StructuralKit = (()=>{
  function skinFloor(innerR, wall, ergonomicSlack){
    return innerR + wall*1.05 + (ergonomicSlack||0);
  }
  function embedInward(radialCenter, ownRadius, fraction){
    return radialCenter - ownRadius*(fraction==null?0.55:fraction);
  }
  function connectAnchorsWithVein(wasm, anchors, intensity, wallRef, extraRadiusMul){
    const parts=[];
    const r=Math.max(AGDP_MIN_WALL_MM*0.62, wallRef*(.09+.16*clamp(intensity,0,1)))*(extraRadiusMul||1);
    for(let i=0;i<anchors.length-1;i++){
      parts.push(cylinderBetween(wasm,anchors[i],anchors[i+1],r,14));
    }
    return parts;
  }
  function buildEventMass(wasm, center, scaleRef, dome, vessel){
    const r = scaleRef*(0.145+0.05*dome+0.04*vessel);
    return flattenedNodeAt(wasm, center, r*(1.15+.20*vessel), r*(0.85+.18*dome), r*(0.92+.24*dome), 24);
  }
  function treatmentMultipliers(treatment){
    if (treatment==='solid') return { thicknessBoost:1.55, crossBracing:0, massCount:0 };
    if (treatment==='volumetric') return { thicknessBoost:1.15, crossBracing:0, massCount:2 };
    return { thicknessBoost:1.0, crossBracing:1, massCount:1 }; // lattice
  }
  return Object.freeze({ skinFloor, embedInward, connectAnchorsWithVein, buildEventMass, treatmentMultipliers });
})();
window.StructuralKit = StructuralKit;

async function makeHoopFaceManifold(wasm, p, outerR, hoopWidth) {
  const baseWallEstimate = Math.max(AGDP_STRUCTURAL_WALL_MM, AGDP_STRUCTURAL_WALL_MM*(0.95+p.architectural*0.85+p.sideRelief*3.4));
  const innerRHoop = Math.max(outerR*0.35, outerR-baseWallEstimate);
  const pForFace = p;
  const { manifold } = await buildBandGeometryManifold(wasm, pForFace, { type:'hoopFace', innerD:innerRHoop*2, width:hoopWidth, closed:true, opening:0 });
  return { manifold, frameHalfW: outerR, frameHalfH: outerR, barR: hoopWidth*0.15 };
}
async function makeCageFaceManifold(wasm, p, outerR, hoopWidth) {
  const frameWidth = Math.max(hoopWidth*0.55, AGDP_STRUCTURAL_WALL_MM*1.3);
  const pFrame = Object.assign({}, p, {holes:0,railCount:Math.min(1,p.railCount||0)});
  const { manifold: frameManifold } = await buildBandGeometryManifold(wasm, pFrame, { type:'cageFrame', innerD:(outerR-frameWidth)*2, width:hoopWidth*0.6, closed:true, opening:0 });
  const barR = Math.max(AGDP_MIN_WALL_MM*1.05, hoopWidth*0.15);
  const capR = barR*1.35;
  const bridgeHalfLen = Math.max(barR*2, outerR-frameWidth*0.45);
  const parts = [frameManifold];
  parts.push(cylinderBetween(wasm, [-bridgeHalfLen,0,0], [bridgeHalfLen,0,0], barR, 16));
  [-bridgeHalfLen, bridgeHalfLen].forEach(x => {
    parts.push(cylinderBetween(wasm, [x,-capR*1.6,0], [x,capR*1.6,0], capR, 14));
    parts.push(sphereAt(wasm, [x,-capR*1.6,0], capR, 12));
    parts.push(sphereAt(wasm, [x,capR*1.6,0], capR, 12));
  });
  const manifold = unionAll(wasm, parts);
  return { manifold, frameHalfW: outerR, frameHalfH: outerR, barR };
}
function makeVesselFaceManifold(wasm, p, outerR, height) {
  const seg = Math.max(80, Math.round(p.segments*0.6)), radSeg = Math.max(24, Math.min(48, Math.round(p.segments/6)));
  const asym = clamp(p.asymmetry||0, 0, .58);
  const tiltAngle = (p.articulationOffset||0)*Math.PI/180;
  function rimR(t) { return outerR*(1+0.20*asym*Math.cos(t-tiltAngle)-0.12*asym*Math.cos(2*(t-tiltAngle))); }
  function heightAt(t) { return height*(1-0.35*asym*Math.cos(t-tiltAngle)); }
  const shell = domeShellMesh(rimR, heightAt, seg, radSeg, null);
  const parts = [meshToManifold(wasm, shell.V, shell.F)];
  const sphereCount = Math.max(1, Math.min(2, Math.round(p.nodes||1)));
  for (let k=0; k<sphereCount; k++) {
    const uPos = 0.24+0.09*k;
    const phi = uPos*Math.PI/2;
    const rOut = rimR(tiltAngle), hOut = heightAt(tiltAngle);
    const rho = rOut*Math.sin(phi), zBase = hOut*Math.cos(phi);
    const sphereR = Math.max(AGDP_MIN_WALL_MM*1.1, (k===0?1:0.22)*(outerR*0.36+p.nodeVolume*0.75));
    const embed = sphereR*0.42;
    const cx = rho*Math.cos(tiltAngle)*0.55, cy = rho*Math.sin(tiltAngle)*0.55;
    parts.push(sphereAt(wasm, [cx,cy,zBase+sphereR-embed], sphereR, 16));
  }
  const manifold = unionAll(wasm, parts);
  return { manifold, outerR, domeHeight: height };
}
function makeDomeFaceManifold(wasm, p, outerR, domeHeight) {
  const seg = Math.max(80, Math.round(p.segments*0.6)), radSeg = Math.max(24, Math.min(48, Math.round(p.segments/6)));
  const sunburstCount = Math.round(clamp(6+p.faceting*10,6,16));
  const grooveDepth = Math.min(domeHeight*0.14, 0.32+p.faceting*0.75);
  const grooveWidth = 0.10;
  function g2(x,s){s=Math.max(1e-6,s);return Math.exp(-(x*x)/(2*s*s));}
  function wrapA(a){while(a>Math.PI)a-=2*Math.PI;while(a<-Math.PI)a+=2*Math.PI;return a;}
  function sunburstMask(t) { let m=0; for(let k=0;k<sunburstCount;k++){const tk=2*Math.PI*k/sunburstCount; m=Math.max(m, g2(wrapA(t-tk), grooveWidth));} return m; }
  function indentFn(t,u) {
    const sm = sunburstMask(t);
    const fadeIn = Math.min(1, u/0.15);
    return { dr: grooveDepth*sm*fadeIn*0.7, dz: grooveDepth*sm*fadeIn*0.5 };
  }
  const shell = domeShellMesh(()=>outerR, ()=>domeHeight, seg, radSeg, indentFn);
  const parts = [meshToManifold(wasm, shell.V, shell.F)];
  const bumpCount = Math.max(0, Math.round(p.nodes||0));
  for (let k=0;k<bumpCount;k++) {
    const ang = (k/Math.max(1,bumpCount))*2*Math.PI*2.4+(p.variation?.phaseA||0);
    const uPos = 0.35+0.45*((k*0.618034)%1);
    const iIdx = ((Math.round((ang/(2*Math.PI))*seg)%seg)+seg)%seg;
    const jIdx = Math.max(1, Math.min(radSeg, Math.round(uPos*radSeg)));
    const realPt = shell.topGrid[iIdx][jIdx];
    const bumpR = Math.max(AGDP_MIN_WALL_MM*0.6, 0.5+p.nodeVolume*0.25);
    const embed = bumpR*0.55;
    const rhoHere = Math.hypot(realPt[0], realPt[1]);
    const nrm = rhoHere>1e-6 ? [realPt[0]/rhoHere, realPt[1]/rhoHere] : [1,0];

// Seed-informed weighted choice: never uniform, always biased by the
// piece's own continuous field, so the base type is a consequence of the
// seed's DNA rather than a coin flip layered on top of it.
function weightedPick(rng, weights){
  const keys = Object.keys(weights);
  const total = keys.reduce((s,k)=>s+Math.max(0,weights[k]),0) || 1;
  let r = rng()*total;
  for (const k of keys){
    r -= Math.max(0,weights[k]);
    if (r<=0) return k;
  }
  return keys[keys.length-1];
}

// The one shared surface-treatment decision every typology consults with
// the same criteria: how solid, how voluminous, or how lattice-like a
// piece's secondary body reads. Ring, comb, money clip, cufflinks — any
// builder that needs this question answered asks it the same way, from
// the same underlying intensities, rather than inventing its own weights
// per category. What differs between categories is only how each one's
// geometry expresses the answer, never how the answer is decided.
function pickStructuralTreatment(p, tag){
  const lattice=featureIntensity(p,'lattice'), dome=featureIntensity(p,'dome'), vessel=featureIntensity(p,'vessel');
  const rng = window.SeededVariation.createGenerator(String(p.seed||'AGDP')+'|'+tag+'|structural-treatment');
  return weightedPick(rng, {
    solid: 0.34+(1-lattice)*0.35,
    volumetric: 0.30+(dome+vessel)*0.28,
    lattice: 0.22+lattice*0.55
  });
}

function addFullVocabularyAccentsGeneric(wasm,parts,p,scaleRef,seedTag,faceKind,nearestFaceVertex,reservedVolumes){
  const weights=p.featureWeights||{};

    const den=ab[0]*ab[0]+ab[1]*ab[1]+ab[2]*ab[2]||1;
    const t=clamp((ap[0]*ab[0]+ap[1]*ab[1]+ap[2]*ab[2])/den,0,1);

    return nearestFaceVertex?nearestFaceVertex(desired):desired;
  }

  const phase=rng()*Math.PI*2;
  const intensity={};
  Object.keys(floors).forEach(k=>intensity[k]=clamp(Math.max(floors[k],weights[k]||0),floors[k],1));

  {
    const center=targetAt(phase+1.18,.34,0);
    const w=scaleRef*(.10+.065*intensity.lattice);
    const h=scaleRef*(.14+.080*intensity.lattice);

      const d=Math.max(scaleRef*1.35,AGDP_MIN_WALL_MM*10);
      voidCutters.push(wasm.Manifold.cube([w,h,d],true).rotate([0,0,(phase+1.18)*180/Math.PI]).translate(center));
    }
  }

  {
    const center=targetAt(phase+2.42,.36,.01);

async function makePendantManifold(wasm, p) {

     a finger aperture, and every interior member is embedded into the band. */

  const targetDepth=clamp(p.bandWidth||4.8,3.6,7.2);

  const polarity=(p.compositionSignature?.polarity||1);

  const architectural=clamp(p.architectural||0,0,1);
  const organic=clamp(p.organic||0,0,1);

  const outerR=targetEnvelope*.5;

    type:'pendantAnnularCore',
    mainSize:innerR*2,
    bandWidth,

    railCount:Math.min(2,p.railCount||0),
    crown:false,
    spikes:0,
    opening:0

  // the annular core deeply; the chain tunnel is cut only after union.
  const passageR=Math.max(.85,p.chainFitRadiusMm!=null?p.chainFitRadiusMm:1.35);
  const topY=outerR*sy;
  const shoulderX=Math.max(annularWall*.55,outerR*sx*.18);
  const shoulderY=topY-annularWall*.48;
