<!-- ============ AGDP SITE HEADER ============ -->
<header class="site-header">
  <nav class="site-nav" aria-label="Primary">
    <div class="brand-item">
      <a href="index.html#top" class="brand" aria-label="A Gross Domestic Product — Home">
        <img src="AGDPLogo.png" alt="A Gross Domestic Product"/>
      </a>
    </div>

    <button
      class="nav-toggle"
      id="navToggle"
      type="button"
      aria-label="Toggle menu"
      aria-controls="navLinks"
      aria-expanded="false"
    >
      ☰
    </button>

    <div class="nav-links" id="navLinks">
      <div class="nav-item">
        <a href="index.html#configurator">Configurator</a>
      </div>

      <div class="nav-item">
        <button
          type="button"
          class="dropdown-toggle"
          data-dropdown
          aria-expanded="false"
        >
          Singular Works <span class="caret" aria-hidden="true">▾</span>
        </button>

        <div class="dropdown">
          <a href="#">(A) Symmetry</a>
          <a href="#">Link</a>
          <a href="#">Cyprus</a>
          <a href="#">Junction</a>
          <a href="#">Bespoke</a>
        </div>
      </div>

      <div class="nav-item">
        <a href="manifesto.html">Manifesto</a>
      </div>

      <div class="nav-item">
        <a class="nav-cta" href="commissions.html">Commissions</a>
      </div>
    </div>
  </nav>
</header>

<script>
(() => {
  const navToggle = document.getElementById('navToggle');
  const navLinks = document.getElementById('navLinks');

  if (!navToggle || !navLinks) return;

  navToggle.addEventListener('click', () => {
    const isOpen = navLinks.classList.toggle('open');
    navToggle.setAttribute('aria-expanded', String(isOpen));
  });

  document.querySelectorAll('[data-dropdown]').forEach((button) => {
    button.addEventListener('click', () => {
      if (window.innerWidth > 860) return;

      const item = button.closest('.nav-item');
      const isOpen = item.classList.toggle('open');
      button.setAttribute('aria-expanded', String(isOpen));
    });
  });

  navLinks.querySelectorAll('a').forEach((link) => {
    link.addEventListener('click', () => {
      if (window.innerWidth > 860) return;
      navLinks.classList.remove('open');
      navToggle.setAttribute('aria-expanded', 'false');
    });
  });
})();
</script>
